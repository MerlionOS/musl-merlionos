name: Build Software for MerlionOS

# Builds real-world software for MerlionOS:
# - nginx (pure C, ~2 min)
# - Envoy (C++, ~2-4 hours)
# - C examples (hello, echo_server, epoll_server, threads, file_io)
#
# Pipeline: musl → libc++ → nginx/Envoy static link.

on:
  workflow_dispatch:  # manual trigger
    inputs:
      envoy_version:
        description: 'Envoy version tag (e.g. v1.31.0)'
        required: false
        default: 'v1.31.0'

jobs:
  build-musl:
    name: "Step 1: Build musl libc"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build musl for MerlionOS
        run: ./build.sh

      - name: Verify sysroot
        run: |
          echo "=== musl sysroot ==="
          ls -lh sysroot/lib/libc.a
          echo "Headers:"
          ls sysroot/include/ | head -20
          echo "Key headers check:"
          for h in stdio.h stdlib.h string.h pthread.h sys/epoll.h sys/socket.h netinet/in.h; do
            [ -f "sysroot/include/$h" ] && echo "  ✓ $h" || echo "  ✗ $h MISSING"
          done

      - name: Upload musl sysroot
        uses: actions/upload-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/
          retention-days: 7

  build-libcxx:
    name: "Step 2: Build libc++"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-musl

    steps:
      - uses: actions/checkout@v4

      - name: Download musl sysroot
        uses: actions/download-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build clang lld

      - name: Build libc++ against musl
        run: |
          # Clone LLVM
          git clone --depth 1 https://github.com/llvm/llvm-project.git llvm-project

          # Build libc++
          mkdir build-libcxx && cd build-libcxx
          cmake ../llvm-project/runtimes \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="--sysroot=${{ github.workspace }}/sysroot -nostdinc -I${{ github.workspace }}/sysroot/include" \
            -DCMAKE_CXX_FLAGS="--sysroot=${{ github.workspace }}/sysroot -nostdinc -nostdinc++ -I${{ github.workspace }}/sysroot/include" \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/sysroot \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DLIBCXX_ENABLE_SHARED=OFF \
            -DLIBCXX_ENABLE_STATIC=ON \
            -DLIBCXX_HAS_MUSL_LIBC=ON \
            -DLIBCXX_ENABLE_THREADS=ON \
            -DLIBCXX_HAS_PTHREAD_API=ON \
            -DLIBCXX_ENABLE_EXCEPTIONS=OFF \
            -DLIBCXX_ENABLE_RTTI=ON \
            -DLIBCXX_ENABLE_LOCALIZATION=OFF \
            -DLIBCXX_ENABLE_UNICODE=OFF \
            -DLIBCXX_ENABLE_WIDE_CHARACTERS=OFF \
            -DLIBCXX_ENABLE_RANDOM_DEVICE=OFF \
            -DLIBCXXABI_ENABLE_SHARED=OFF \
            -DLIBCXXABI_ENABLE_STATIC=ON \
            -DLIBCXXABI_ENABLE_EXCEPTIONS=OFF \
            -DLIBCXXABI_USE_LLVM_UNWINDER=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            2>&1 | tail -10

          ninja -j$(nproc) 2>&1 | tail -5
          ninja install 2>&1 | tail -5

      - name: Verify C++ sysroot
        run: |
          echo "=== C++ sysroot ==="
          ls -lh sysroot/lib/libc++.a sysroot/lib/libc++abi.a 2>/dev/null || echo "libc++ not found"
          ls sysroot/include/c++/v1/ 2>/dev/null | head -10 || echo "C++ headers not found"

      - name: Upload full sysroot
        uses: actions/upload-artifact@v4
        with:
          name: merlionos-sysroot
          path: sysroot/
          retention-days: 7

  build-envoy:
    name: "Step 3: Build Envoy"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: build-libcxx

    steps:
      - uses: actions/checkout@v4

      - name: Download MerlionOS sysroot
        uses: actions/download-artifact@v4
        with:
          name: merlionos-sysroot
          path: sysroot/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            clang lld python3 python-is-python3 \
            libtool autoconf automake curl unzip openjdk-17-jdk

      - name: Install Bazelisk
        run: |
          curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel

      - name: Clone Envoy
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.envoy_version || 'v1.31.0' }} \
            https://github.com/envoyproxy/envoy.git envoy

      - name: Configure Envoy for MerlionOS
        run: |
          cd envoy

          # Create user.bazelrc for MerlionOS static build
          cat > user.bazelrc << EOF
          build --config=libc++
          build --define=wasm=disabled
          build --define=tcmalloc=disabled
          build --define=admin_html=disabled
          build --copt=-static
          build --copt=--sysroot=${{ github.workspace }}/sysroot
          build --copt=-nostdinc
          build --copt=-I${{ github.workspace }}/sysroot/include
          build --copt=-I${{ github.workspace }}/sysroot/include/c++/v1
          build --copt=-fno-exceptions
          build --copt=-D__MERLIONOS__
          build --linkopt=-static
          build --linkopt=-nostdlib
          build --linkopt=-L${{ github.workspace }}/sysroot/lib
          build --linkopt=-lc++
          build --linkopt=-lc++abi
          build --linkopt=-lc
          build --linkopt=-fuse-ld=lld
          EOF

      - name: Build Envoy (static)
        run: |
          cd envoy
          bazel build \
            --jobs=$(nproc) \
            //source/exe:envoy-static \
            2>&1 | tail -30 || echo "Build attempted"

      - name: Verify binary
        run: |
          ENVOY_BIN="envoy/bazel-bin/source/exe/envoy-static"
          if [ -f "$ENVOY_BIN" ]; then
            echo "=== Envoy binary ==="
            file "$ENVOY_BIN"
            ls -lh "$ENVOY_BIN"
            echo "SUCCESS: Envoy built for MerlionOS"
          else
            echo "Envoy binary not produced."
            echo "This is expected on first attempt — Envoy has complex"
            echo "build dependencies that may need manual patching."
            echo ""
            echo "See docs/running-envoy-on-merlionos.md for details."
          fi

      - name: Upload Envoy binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: envoy-merlionos
          path: envoy/bazel-bin/source/exe/envoy-static
          retention-days: 30
          if-no-files-found: ignore

  build-nginx:
    name: "Build nginx"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-musl

    steps:
      - uses: actions/checkout@v4

      - name: Download musl sysroot
        uses: actions/download-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools

      - name: Build nginx
        run: |
          CC=musl-gcc ./build-nginx.sh 2>&1 | tail -20

      - name: Verify binary
        run: |
          if [ -f "nginx-merlionos" ]; then
            echo "=== nginx binary ==="
            file nginx-merlionos
            ls -lh nginx-merlionos
            echo "SUCCESS: nginx built for MerlionOS"
          else
            echo "nginx binary not produced"
          fi

      - name: Upload nginx binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-merlionos
          path: nginx-merlionos
          retention-days: 30
          if-no-files-found: ignore

  build-lua:
    name: "Build Lua"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-musl

    steps:
      - uses: actions/checkout@v4

      - name: Download musl sysroot
        uses: actions/download-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools

      - name: Build Lua
        run: CC=musl-gcc ./build-lua.sh 2>&1 | tail -10

      - name: Upload Lua binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lua-merlionos
          path: |
            lua-merlionos
            luac-merlionos
          retention-days: 30
          if-no-files-found: ignore

  build-nodejs:
    name: "Build Node.js"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: build-libcxx

    steps:
      - uses: actions/checkout@v4

      - name: Download sysroot
        uses: actions/download-artifact@v4
        with:
          name: merlionos-sysroot
          path: sysroot/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Build Node.js
        run: ./build-nodejs.sh 2>&1 | tail -20

      - name: Upload Node binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-merlionos
          path: node-merlionos
          retention-days: 30
          if-no-files-found: ignore

  build-python:
    name: "Build Python 3"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-musl

    steps:
      - uses: actions/checkout@v4

      - name: Download musl sysroot
        uses: actions/download-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools

      - name: Build CPython
        run: CC=musl-gcc ./build-python.sh 2>&1 | tail -20

      - name: Upload Python binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python3-merlionos
          path: python3-merlionos
          retention-days: 30
          if-no-files-found: ignore

  build-examples:
    name: "Build C examples"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-musl

    steps:
      - uses: actions/checkout@v4

      - name: Download musl sysroot
        uses: actions/download-artifact@v4
        with:
          name: musl-sysroot
          path: sysroot/

      - name: Install musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build examples
        run: |
          cd examples
          make CC=musl-gcc CFLAGS="-static -O2 -Wall" 2>&1

      - name: Verify examples
        run: |
          echo "=== Built examples ==="
          for f in examples/hello examples/echo_server examples/epoll_server examples/threads examples/file_io; do
            if [ -f "$f" ]; then
              echo "  ✓ $(basename $f) ($(wc -c < $f | tr -d ' ') bytes)"
              file "$f"
            fi
          done

      - name: Upload example binaries
        uses: actions/upload-artifact@v4
        with:
          name: merlionos-examples
          path: |
            examples/hello
            examples/echo_server
            examples/epoll_server
            examples/threads
            examples/file_io
          retention-days: 30
          if-no-files-found: ignore
